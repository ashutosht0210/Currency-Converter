<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <h2>Currency Converter</h2>
        <form>
            <div class="amount">
                <p>Enter Amount</p>
                <input type="number" value="100" placeholder="Enter amount" id="amount"> 
            </div>
            <div class="dropdown">
                <div class="from">
                    <p>From</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/US/shiny/64.png" id="flag1">
                        <select name="from" class="countries" id="from">
                        </select>
                    </div>
                </div>

                <button id="exIcon"><i class="fa-solid fa-arrow-right-arrow-left"></i></button>
                

                <div class="to">
                    <p>To</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/IN/shiny/64.png" id="flag2">
                        <select name="to" class="countries" id="to">
                        </select>
                    </div>
                </div>
            </div>
            <div class="msg"></div>
        </form>
        <button id="getExRate">Convert Currency</button>
    </div>

    <script src="code.js"></script>
    <script src="script.js"></script>
</body>
</html>
